name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: konek.vps-poliban.my.id
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/tct/Tikum-Cafe-Tracker
            git pull origin main
            npm ci
            npm run build
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/
            service nginx reload
