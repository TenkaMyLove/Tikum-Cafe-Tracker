name: GA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "GitHub SSH key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
                cd /var/www/tct/Tikum-Cafe-Tracker
                git pull origin main
                npm ci
                npm run build
                rm -rf /var/www/html/*
                cp -r dist/* /var/www/html/
                service nginx reload
          EOF
