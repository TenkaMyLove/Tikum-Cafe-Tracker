name: GA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "GitHub SSH key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\" && cd /home/tikumono/public_html/cafe && git pull origin main && npm install && npm run build && cp -r dist/* . && mkdir -p tmp && touch tmp/restart.txt"
